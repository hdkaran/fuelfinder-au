# FuelFinder AU — Continuous Deployment
# Runs on every push to master.
# Builds & pushes Docker image → runs DB migrations → deploys API + SPA → smoke test.
#
# Required secrets:
#   AZURE_CREDENTIALS          — JSON output of: az ad sp create-for-rbac --sdk-auth
#   AZURE_RESOURCE_GROUP       — Name of the Azure resource group (e.g. "fuelfinder-rg")
#   ACR_NAME                   — Azure Container Registry name (e.g. "fuelfindercr")
#   DB_CONNECTION_STRING        — SQL connection string for EF Core migrations
#   AZURE_STATIC_WEB_APPS_API_TOKEN — Deployment token from Static Web Apps resource
#   GOOGLE_MAPS_API_KEY        — Google Maps JS API key (written to Key Vault post-deploy)
#   FUELCHECK_API_KEY          — NSW FuelCheck API key for seeding stations

name: CD

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: fuelfinder-api

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure login ───────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Resolve App Service name (unique suffix from Bicep) ────────────────
      # The App Service name includes a uniqueString suffix derived from the
      # resource group ID (see infra/modules/appService.bicep). We query Azure
      # at deploy time rather than hardcoding it.
      - name: Resolve App Service name
        run: |
          NAME=$(az webapp list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'fuelfinder-api')].name | [0]" \
            -o tsv)
          echo "APP_SERVICE_NAME=$NAME" >> $GITHUB_ENV

      # ── Docker: build & push API image ────────────────────────────────────
      - name: Login to ACR
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          IMAGE_TAG=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST src/FuelFinder.Api
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      # ── .NET: EF Core database migrations ─────────────────────────────────
      - name: Setup .NET 10
        if: hashFiles('src/FuelFinder.sln') != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dotnet-ef tool
        if: hashFiles('src/FuelFinder.sln') != ''
        run: dotnet tool install -g dotnet-ef

      - name: Restore NuGet packages
        if: hashFiles('src/FuelFinder.sln') != ''
        working-directory: src
        run: dotnet restore FuelFinder.sln

      - name: Run database migrations
        if: hashFiles('src/FuelFinder.sln') != ''
        working-directory: src/FuelFinder.Api
        env:
          ConnectionStrings__SqlConnection: ${{ secrets.DB_CONNECTION_STRING }}
        run: dotnet ef database update

      # ── Deploy API to App Service ──────────────────────────────────────────
      - name: Deploy API to App Service
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          images: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Configure CORS on API ─────────────────────────────────────────────
      # Resolve the SWA and CDN hostnames and add both as allowed origins on
      # the API. Users may arrive via either hostname, so both need to be in
      # the CORS allowlist for the browser preflight check to pass.
      - name: Configure CORS on API
        run: |
          SWA_HOST=$(az staticwebapp list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'fuelfinder')].defaultHostname | [0]" \
            -o tsv)
          echo "SWA_HOST=$SWA_HOST" >> $GITHUB_ENV

          az webapp config appsettings set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
              "AllowedOrigins__0=https://$SWA_HOST" \
              "FuelCheck__ApiKey=${{ secrets.FUELCHECK_API_KEY }}"

      # ── Deploy frontend to Static Web Apps ────────────────────────────────
      - name: Deploy frontend to Static Web Apps
        if: hashFiles('src/web/package.json') != ''
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/web
          output_location: dist

      # ── Smoke tests ────────────────────────────────────────────────────────
      # Retry /health for up to 3 minutes (18 × 10 s) to give the container
      # time to pull and start. Then check the API and stats endpoints.
      - name: Smoke test — wait for App Service to become healthy
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          API_BASE="https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net"
          echo "Waiting for $API_BASE/health ..."
          for i in $(seq 1 18); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$API_BASE/health" || true)
            echo "  attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              break
            fi
            if [ $i -eq 18 ]; then
              echo "::error::App Service did not become healthy within 3 minutes."
              exit 1
            fi
            sleep 10
          done

      - name: Smoke test — /api/stats/summary
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          API_BASE="https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$API_BASE/api/stats/summary" || true)
            echo "  attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "OK"; break; fi
            if [ $i -eq 6 ]; then echo "::error::Smoke test failed after 6 attempts."; exit 1; fi
            sleep 10
          done

      - name: Smoke test — /api/stations/nearby (returns 200 with array)
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          API_BASE="https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              "$API_BASE/api/stations/nearby?lat=-33.8688&lng=151.2093&radius=10000" || true)
            echo "  attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "OK"; break; fi
            if [ $i -eq 6 ]; then echo "::error::Smoke test failed after 6 attempts."; exit 1; fi
            sleep 10
          done

      # ── Deployment summary ────────────────────────────────────────────────
      - name: Print deployment summary
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (SWA) | https://${{ env.SWA_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
