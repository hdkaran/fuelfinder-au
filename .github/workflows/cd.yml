# FuelFinder AU — Continuous Deployment
# Runs on every push to master.
# Builds & pushes Docker image → runs DB migrations → deploys API + SPA → smoke test.
#
# Required secrets:
#   AZURE_CREDENTIALS          — JSON output of: az ad sp create-for-rbac --sdk-auth
#   AZURE_RESOURCE_GROUP       — Name of the Azure resource group (e.g. "fuelfinder-rg")
#   ACR_NAME                   — Azure Container Registry name (e.g. "fuelfindercr")
#   DB_CONNECTION_STRING        — SQL connection string for EF Core migrations
#   AZURE_STATIC_WEB_APPS_API_TOKEN — Deployment token from Static Web Apps resource
#   GOOGLE_MAPS_API_KEY        — Google Maps JS API key (written to Key Vault post-deploy)

name: CD

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: fuelfinder-api

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure login ───────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Resolve App Service name (unique suffix from Bicep) ────────────────
      # The App Service name includes a uniqueString suffix derived from the
      # resource group ID (see infra/modules/appService.bicep). We query Azure
      # at deploy time rather than hardcoding it.
      - name: Resolve App Service name
        run: |
          NAME=$(az webapp list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'fuelfinder-api')].name | [0]" \
            -o tsv)
          echo "APP_SERVICE_NAME=$NAME" >> $GITHUB_ENV

      # ── Docker: build & push API image ────────────────────────────────────
      - name: Login to ACR
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          IMAGE_TAG=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST src/FuelFinder.Api
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      # ── .NET: EF Core database migrations ─────────────────────────────────
      - name: Setup .NET 8
        if: hashFiles('src/FuelFinder.sln') != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef tool
        if: hashFiles('src/FuelFinder.sln') != ''
        run: dotnet tool install -g dotnet-ef

      - name: Restore NuGet packages
        if: hashFiles('src/FuelFinder.sln') != ''
        working-directory: src
        run: dotnet restore FuelFinder.sln

      - name: Run database migrations
        if: hashFiles('src/FuelFinder.sln') != ''
        working-directory: src/FuelFinder.Api
        env:
          ConnectionStrings__SqlConnection: ${{ secrets.DB_CONNECTION_STRING }}
        run: dotnet ef database update

      # ── Deploy API to App Service ──────────────────────────────────────────
      - name: Deploy API to App Service
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          images: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Deploy frontend to Static Web Apps ────────────────────────────────
      - name: Deploy frontend to Static Web Apps
        if: hashFiles('src/web/package.json') != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/web
          output_location: dist

      # ── Smoke test ─────────────────────────────────────────────────────────
      # Skipped until a Dockerfile exists and an image has actually been deployed.
      - name: Smoke test — wait for App Service to start
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: sleep 30

      - name: Smoke test — /health endpoint
        if: hashFiles('src/FuelFinder.Api/Dockerfile') != ''
        run: |
          curl --fail --silent --show-error \
            https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/health
