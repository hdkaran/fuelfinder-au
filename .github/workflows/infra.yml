# FuelFinder AU — Infrastructure Provisioning
# Runs on push to master when any infra/** file changes.
# Deploys (or updates) all Azure resources via Bicep.
#
# Required secrets:
#   AZURE_CREDENTIALS          — JSON output of: az ad sp create-for-rbac --sdk-auth
#   AZURE_RESOURCE_GROUP       — Name of the Azure resource group (e.g. "fuelfinder-rg")
#   SQL_ADMIN_PASSWORD         — SQL administrator password (must match the current DB password)
#
# Custom domain binding (SEPARATE manual workflow — see bind-custom-domain.yml):
#   Custom domain binding is intentionally NOT part of this workflow.
#   Azure validates DNS before binding — running it on every push causes 2-hour hangs
#   if DNS is not yet propagated. Use the bind-custom-domain.yml workflow manually
#   once GoDaddy records are confirmed working (see docs/dns-setup.md).
#
# Informational (not used by this workflow):
#   ACR_NAME                   — Container registry name
#   DB_CONNECTION_STRING        — Populated automatically into Key Vault by Bicep
#   AZURE_STATIC_WEB_APPS_API_TOKEN — SWA deployment token
#   GOOGLE_MAPS_API_KEY        — Written to Key Vault manually post-deploy

name: Infrastructure

on:
  push:
    branches:
      - master
    paths:
      - "infra/**"

jobs:
  deploy-infra:
    name: Provision Azure Resources
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure login ───────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Deploy Bicep ───────────────────────────────────────────────────────
      # Custom domain params are intentionally omitted here — use bind-custom-domain.yml
      # manually after DNS is confirmed. Passing them here causes deployment hangs when
      # Azure cannot validate DNS ownership.
      - name: Deploy Bicep — create or update all Azure resources
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/master.bicep \
            --parameters @infra/parameters.json \
            --parameters sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }} \
            --mode Incremental \
            --verbose

      # ── Print deployed URLs ────────────────────────────────────────────────
      - name: Print deployed resource URLs
        run: |
          OUTPUTS=$(az deployment group show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name master \
            --query properties.outputs \
            --output json)

          API_URL=$(echo $OUTPUTS | jq -r '.appServiceUrl.value')
          SWA_URL=$(echo $OUTPUTS | jq -r '.staticWebAppUrl.value')
          SWA_HOST=$(echo $OUTPUTS | jq -r '.staticWebAppHostname.value')
          API_HOST=$(echo $OUTPUTS | jq -r '.appServiceHostname.value')
          KV_NAME=$(echo $OUTPUTS | jq -r '.keyVaultName.value')

          echo "## Deployed Resources" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API (App Service) | $API_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Static Web App) | $SWA_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Key Vault | $KV_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GoDaddy DNS Records needed for fuelstock.com.au" >> $GITHUB_STEP_SUMMARY
          echo "See docs/dns-setup.md — then run the bind-custom-domain workflow manually." >> $GITHUB_STEP_SUMMARY
          echo "| Type | Name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| CNAME | www | $SWA_HOST |" >> $GITHUB_STEP_SUMMARY
          echo "| CNAME | api | $API_HOST |" >> $GITHUB_STEP_SUMMARY
