# FuelFinder AU — Infrastructure Provisioning
# Runs on push to master when any infra/** file changes.
# Deploys (or updates) all Azure resources via Bicep.
#
# Required secrets:
#   AZURE_CREDENTIALS          — JSON output of: az ad sp create-for-rbac --sdk-auth
#   AZURE_RESOURCE_GROUP       — Name of the Azure resource group (e.g. "fuelfinder-rg")
#   ACR_NAME                   — (Informational — not used in this workflow directly)
#   DB_CONNECTION_STRING        — (Informational — populated after first deploy)
#   AZURE_STATIC_WEB_APPS_API_TOKEN — (Informational — populated after first deploy)
#   GOOGLE_MAPS_API_KEY        — (Informational — written to Key Vault manually post-deploy)

name: Infrastructure

on:
  push:
    branches:
      - master
    paths:
      - "infra/**"

jobs:
  deploy-infra:
    name: Provision Azure Resources
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure login ───────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Deploy Bicep ───────────────────────────────────────────────────────
      - name: Deploy Bicep — create or update all Azure resources
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/master.bicep \
            --parameters @infra/parameters.json \
            --mode Incremental \
            --verbose

      # ── Print deployed URLs ────────────────────────────────────────────────
      - name: Print deployed resource URLs
        run: |
          OUTPUTS=$(az deployment group show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name master \
            --query properties.outputs \
            --output json)

          API_URL=$(echo $OUTPUTS | jq -r '.appServiceUrl.value')
          SWA_URL=$(echo $OUTPUTS | jq -r '.staticWebAppUrl.value')
          KV_NAME=$(echo $OUTPUTS | jq -r '.keyVaultName.value')

          echo "## Deployed Resources" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API (App Service) | $API_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Static Web App) | $SWA_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Key Vault | $KV_NAME |" >> $GITHUB_STEP_SUMMARY
